<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Lab 4</title>
</head>
<body>
    <main>
        <h1>Flexbox Lab</h1>
    </main>
    <section>
        <h2>Two Equal Sized Boxes</h2>
        <div class="flex-container paddington">
            <div class="flex-item paddington"></div>
            <div class="flex-item paddington"></div>
        </div>
    </section>
    <section>
        <h2>Three Equal Sized Boxes</h2>
        <div class="flex-container padding15">
            <div class="flex-item padding15"></div>
            <div class="flex-item padding15"></div>
            <div class="flex-item padding15"></div>
        </div>
    </section>
    <section>
        <h2>Three unequal sized boxes</h2>
        <div class="flex-container padding12">
            <div class="flex-item padding12 grow2 border"></div>
            <div class="flex-item padding12 grow1 border"></div>
            <div class="flex-item padding12 grow1 border"></div>
        </div>
    </section>
    <section>
        <h2>Four equal boxes and a footer</h2>
        <div class="flex-container padding12">
            <div class="flex-item padding12 grow1 border"></div>
            <div class="flex-item padding12 grow1 border"></div>
            <div class="flex-item padding12 grow1 border"></div>
            <div class="flex-item padding12 grow1 border"></div>
            <div class="flex-item padding12 grow4 border align-center"></div>
        </div>
    </section>
</body>
</html>
