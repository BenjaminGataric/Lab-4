<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Lab 4</title>
</head>
<body>
    <main>
        <h1>Flexbox Lab</h1>
    </main>
    <h2>Two Equal Sized Boxes</h2>
    <section class="flex-container justify-evenly wrap paddington">
        <div class="flex-item paddington">1</div>
        <div class="flex-item paddington">1</div>
    </section>
    <h2>Three Equal Sized Boxes</h2>
    <section class="flex-container justify-evenly wrap padding15">
        <div class="flex-item padding15">1</div>
        <div class="flex-item padding15">1</div>
        <div class="flex-item padding15">1</div>
    </section>
    <h2>Three unequal sized boxes</h2>
    <section class="flex-container justify-evenly wrap padding12">
        <div class="flex-item padding12 grow2 border">1</div>
        <div class="flex-item padding12 grow1 border">1</div>
        <div class="flex-item padding12 grow1 border">1</div>
    </section>
    <h2>Four equal boxes and a footer</h2>
    <section class="flex-container justify-around wrap padding12">
        <div class="flex-item padding12 grow1 border">1</div>
        <div class="flex-item padding12 grow1 border">1</div>
        <div class="flex-item padding12 grow1 border">1</div>
        <div class="flex-item padding12 grow1 border">1</div>
        <div class="flex-item padding12 grow2 border">1</div>
    </section>
</body>
</html>
